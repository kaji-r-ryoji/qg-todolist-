<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 待办事项</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 顶部导航栏 -->
    <nav>
        <a href="#">关于我</a>
        <span>En / 中</span>
    </nav>

    <!-- 页面标题区域 -->
    <header>
        <h1>TODO<img src="./image/width_939.png" alt="todo_logo" width="360" height="120"></h1>
    </header>

    <!-- 主容器区域 -->
    <main>

        <!-- 输入区域 -->
        <section class="input-section">
            <input type="text" id="todo-input" placeholder="新增待办事项...">
            <button class="input_button">提交</button>
        </section>


        <!-- 内容区域（左右布局） -->
        <div class="content-wrapper">

            <!-- 左侧：待办列表区域 -->
            <section class="todo-section">

                <!-- 列表头部工具栏 -->
                <div class="todo-toolbar">
                    <button class="btn-complete-all">全部标为完成</button>
                    <span class="todo-hint">今日事今日毕，勿将今事待明日! ✏️ ✏️</span>
                </div>
                
                <!-- 待办事项列表容器 -->
                <div class="todo-list">
                    <!-- 空状态提示 -->
                    <div class="todo-card empty-hint">
                        <span class="todo-text">暂无待办事项，快去添加一个吧！</span>
                    </div>
                    
                    <!-- 示例卡片：复选框选中状态（有 completed 类） -->
                    <!-- 
                    <div class="todo-card completed">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" class="round-checkbox" checked>
                        </div>
                        <span class="todo-text">已完成的示例</span>
                        <button class="btn-delete">×</button>
                    </div>
                    -->
                    
                    <!-- 示例卡片：回收站状态（有 recycle 类） -->
                    <!--
                    <div class="todo-card recycle" style="display: none;">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" class="round-checkbox">
                        </div>
                        <span class="todo-text">回收站中的示例</span>
                        <button class="btn-delete">×</button>
                    </div>
                    -->
                </div>
            </section>


            <!-- 右侧：功能侧边栏 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="toggle-btn">开</span>
                    <span class="open-emoji"><img src="./图标/科技媒体-悬停.png" height="20px" width="20px"></span>
                </div>
                
                <ul class="sidebar-menu">
                    <li class="menu-item active">全部</li>
                    <li class="menu-item">进行中</li>
                    <li class="menu-item">已完成</li>
                    <li class="menu-item">回收站</li>
                    <li class="menu-item divider">全部标为已完成</li>
                    <li class="menu-item">清除已完成</li>
                    <li class="menu-item">清除全部</li>
                </ul>
            </aside>

        </div>

    </main>


    <!-- 页面底部 -->
    <footer>
        <p>TODO List - 简单实用的待办事项管理工具</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
